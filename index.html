<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Bill System</title>

    <!-- PWA Meta -->
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-glass: rgba(255, 255, 255, 0.65);
            --bg-glass-hover: rgba(255, 255, 255, 0.85);
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --text-muted: #7a7a9a;
            --border-color: rgba(0, 0, 0, 0.08);
            --border-glass: rgba(255, 255, 255, 0.3);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.12);
            --accent: #e85d3a;
            --accent-hover: #d14a2a;
            --green: #10b981;
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font-mono: 'Courier New', monospace;
            --font-sans: 'Inter', system-ui, sans-serif;
        }

        .dark {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-glass: rgba(30, 30, 55, 0.7);
            --bg-glass-hover: rgba(40, 40, 70, 0.85);
            --text-primary: #e8e8f0;
            --text-secondary: #b0b0c8;
            --text-muted: #707090;
            --border-color: rgba(255, 255, 255, 0.08);
            --border-glass: rgba(255, 255, 255, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background var(--transition), color var(--transition);
        }

        .app-header {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-glass);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .btn {
            padding: 10px 18px;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            font-family: var(--font-sans);
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: var(--bg-glass);
            color: var(--text-primary);
            border: 1.5px solid var(--border-color);
            transition: all var(--transition);
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
        .btn-danger { background: #ef4444; color: #fff; border-color: #ef4444; }
        .glass-card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.06);
        }
        .hidden { display: none !important; }
        .form-group { margin-bottom: 14px; }
        .form-group label { font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); display: block; margin-bottom: 4px; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-family: var(--font-sans);
            outline: none;
        }
        .items-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .items-table th { background: var(--bg-secondary); padding: 10px; text-align: left; }
        .items-table td { padding: 8px; border-bottom: 1px solid var(--border-color); }
        .totals-box { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 16px; margin-top: 12px; }
        .totals-box .row { display: flex; justify-content: space-between; padding: 4px 0; }
        .totals-box .grand { font-weight: 800; font-size: 1.1rem; border-top: 2px dashed var(--border-color); padding-top: 8px; margin-top: 4px; color: var(--accent); }

        .thermal-receipt {
            background: #fffdf7;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ddd;
            color: #1a1a1a;
        }
        .dark .thermal-receipt { background: #1e1e18; color: #e8e8e0; }
        .a4-invoice {
            background: #fff;
            padding: 24px;
            border-radius: 8px;
            font-size: 0.85rem;
        }
        .dark .a4-invoice { background: #1c1c28; color: #e8e8e0; }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px); z-index: 999; display: flex; align-items: center; justify-content: center;
        }
        .modal-dialog { background: var(--bg-secondary); border-radius: var(--radius-lg); padding: 24px; max-width: 420px; width: 90%; text-align: center; }

        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 2000; }
        .toast {
            padding: 12px 20px; border-radius: var(--radius-sm); background: var(--bg-secondary);
            color: var(--text-primary); box-shadow: var(--shadow-lg); font-weight: 600;
            border-left: 4px solid var(--green); margin-top: 8px; animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { transform: translateX(120%); } }

        @media (max-width: 700px) { .glass-card { margin: 8px; padding: 16px; } }
    </style>
</head>
<body>
    <!-- OWNER DASHBOARD (visible when no ?data in URL) -->
    <div id="ownerUI">
        <header class="app-header">
            <h1>🧾 Bill Generator</h1>
            <div style="display:flex; gap:8px;">
                <button class="btn btn-sm" onclick="toggleTheme()" id="themeBtn">🌙 Dark</button>
                <button class="btn btn-sm" onclick="resetAll()">🗑️ New</button>
            </div>
        </header>

        <div style="max-width:1200px; margin:0 auto; padding:16px; display:grid; grid-template-columns:1fr 1fr; gap:20px;">
            <!-- Left Column -->
            <div>
                <!-- Settings -->
                <div class="glass-card">
                    <h2>🏪 Restaurant Details</h2>
                    <div class="form-group"><label>Name *</label><input id="restName" value="Spice Garden Bistro"></div>
                    <div class="form-group"><label>Phone</label><input id="restPhone" value="+91 98765 43210"></div>
                    <div class="form-group"><label>Address</label><textarea id="restAddress" rows="2">123, MG Road, Indiranagar, Bengaluru - 560038</textarea></div>
                    <div class="form-group"><label>GST</label><input id="restGST" value="29ABCDE1234F1Z5"></div>
                    <div class="form-group">
                        <label>Logo</label>
                        <input type="file" id="logoInput" accept="image/*" onchange="handleLogo(event)" style="padding:8px;">
                        <img id="logoPreview" class="hidden" style="max-width:80px; max-height:50px; margin-top:8px;">
                    </div>
                </div>

                <!-- Menu Presets -->
                <div class="glass-card">
                    <h2>📌 Saved Menu Items</h2>
                    <div style="display:flex; gap:8px;">
                        <input id="presetName" placeholder="Item name" style="flex:2;">
                        <input id="presetPrice" type="number" placeholder="Price" step="0.01" style="flex:1;">
                        <button class="btn btn-sm" onclick="addPreset()">➕ Save</button>
                    </div>
                    <div id="presetList" style="max-height:200px; overflow-y:auto; margin-top:8px;"></div>
                    <button class="btn btn-sm" onclick="clearPresets()" style="margin-top:8px;">🗑️ Clear Presets</button>
                </div>

                <!-- Items Table -->
                <div class="glass-card">
                    <h2>📋 Bill Items</h2>
                    <table class="items-table">
                        <thead><tr><th>#</th><th>Item</th><th>Qty</th><th>Price</th><th>Total</th><th></th></tr></thead>
                        <tbody id="itemsBody"></tbody>
                    </table>
                    <div style="margin-top:8px; display:flex; gap:8px;">
                        <button class="btn btn-sm" onclick="addItem()">➕ Add Item</button>
                        <button class="btn btn-sm" onclick="addSampleItems()">📋 Sample</button>
                        <button class="btn btn-sm btn-danger" onclick="clearItems()">🗑️ Clear</button>
                    </div>

                    <div class="totals-box">
                        <div class="row"><span>Subtotal</span><span id="subtotalDisplay">₹0.00</span></div>
                        <div class="row"><span>GST Rate</span>
                            <select id="gstRate" onchange="recalcTotals()">
                                <option value="0">0%</option><option value="5" selected>5%</option><option value="12">12%</option><option value="18">18%</option><option value="28">28%</option>
                            </select>
                        </div>
                        <div class="row"><span>GST Amount</span><span id="gstAmountDisplay">₹0.00</span></div>
                        <div class="row grand"><span>💰 Grand Total</span><span id="grandTotalDisplay">₹0.00</span></div>
                    </div>

                    <div style="display:flex; gap:8px; margin-top:12px;">
                        <div class="form-group" style="flex:1;"><label>Invoice #</label><input id="invoiceNumber" readonly></div>
                        <div class="form-group" style="flex:1;"><label>Date</label><input id="invoiceDate" readonly></div>
                    </div>
                    <button class="btn btn-primary" onclick="generateQR()" style="width:100%; justify-content:center;">📱 Generate QR Code</button>
                </div>
            </div>

            <!-- Right Column (Preview) -->
            <div>
                <div class="glass-card" style="position:sticky; top:80px;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h2>👁️ Live Preview</h2>
                        <div>
                            <button class="btn btn-sm" onclick="switchPreview('thermal')" id="thermalTab" style="background:var(--accent); color:#fff;">🧾 Thermal</button>
                            <button class="btn btn-sm" onclick="switchPreview('a4')" id="a4Tab">📄 A4</button>
                        </div>
                    </div>
                    <div id="thermalPreview" class="thermal-receipt" style="margin-top:12px;"></div>
                    <div id="a4Preview" class="a4-invoice hidden" style="margin-top:12px;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- CUSTOMER BILL VIEW (visible when ?data present) -->
    <div id="customerUI" class="hidden">
        <div class="glass-card" style="max-width:500px; margin:40px auto;">
            <h2 style="text-align:center;">🧾 Your Bill</h2>
            <div id="customerBillContent"></div>
            <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:16px; justify-content:center;">
                <button class="btn" onclick="downloadPDF()">📥 PDF</button>
                <button class="btn" onclick="printBill()">🖨️ Print</button>
                <button class="btn" onclick="shareBill()">🔗 Share</button>
                <button class="btn" onclick="copyBillDetails()">📋 Copy</button>
            </div>
        </div>
    </div>

    <!-- QR Modal (owner side) -->
    <div id="qrModal" class="modal-overlay hidden">
        <div class="modal-dialog">
            <h3>📱 Scan to View Bill</h3>
            <div id="qrCodeContainer" style="display:inline-block; padding:12px; background:#fff; border-radius:12px; margin:12px 0;"></div>
            <div id="qrUrlDisplay" style="word-break:break-all; font-size:0.7rem; color:var(--text-muted);"></div>
            <div style="display:flex; gap:8px; justify-content:center; margin-top:12px;">
                <button class="btn btn-sm" onclick="copyQRUrl()">📋 Copy</button>
                <button class="btn btn-sm" onclick="closeQRModal()">✕ Close</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ========== DETECT CUSTOMER vs OWNER ==========
        const urlParams = new URLSearchParams(window.location.search);
        const isCustomer = urlParams.has('data');

        if (isCustomer) {
            document.getElementById('ownerUI').classList.add('hidden');
            document.getElementById('customerUI').classList.remove('hidden');
            loadCustomerBill();
        } else {
            document.getElementById('customerUI').classList.add('hidden');
            document.getElementById('ownerUI').classList.remove('hidden');
            initOwner();
        }

        // ========== COMMON UTILS ==========
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        function showToast(msg, isError=false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderLeftColor = isError ? '#ef4444' : 'var(--green)';
            toast.textContent = msg;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }
        function toggleTheme() {
            document.body.classList.toggle('dark');
            document.getElementById('themeBtn').innerHTML = document.body.classList.contains('dark') ? '☀️ Light' : '🌙 Dark';
        }

        // ========== CUSTOMER SIDE ==========
        let customerBillData = null;
        function base64UrlToUint8Array(str) {
            str = str.replace(/-/g, '+').replace(/_/g, '/');
            while (str.length % 4) str += '=';
            const binary = atob(str);
            const arr = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) arr[i] = binary.charCodeAt(i);
            return arr;
        }
        function decodeBill(encoded) {
            try {
                const compressed = base64UrlToUint8Array(encoded);
                const json = pako.inflate(compressed, { to: 'string' });
                return JSON.parse(json);
            } catch(e) { return null; }
        }
        function loadCustomerBill() {
            const encoded = urlParams.get('data');
            const bill = decodeBill(encoded);
            if (!bill || !bill.items) {
                document.getElementById('customerBillContent').innerHTML = '<p style="text-align:center; color:red;">Bill not found or invalid QR code.</p>';
                return;
            }
            customerBillData = bill;
            renderCustomerReceipt(bill);
        }
        function renderCustomerReceipt(bill) {
            const el = document.getElementById('customerBillContent');
            el.innerHTML = `
                <div class="thermal-receipt">
                    <div style="text-align:center;">
                        ${bill.restaurant.logo ? `<img src="${bill.restaurant.logo}" style="max-width:50px;">` : ''}
                        <div style="font-weight:700;">${escapeHtml(bill.restaurant.name)}</div>
                        <div style="font-size:0.7rem;">${escapeHtml(bill.restaurant.address)}</div>
                        <div style="font-size:0.7rem;">📞 ${escapeHtml(bill.restaurant.phone)}</div>
                        ${bill.restaurant.gstNumber ? `<div style="font-size:0.6rem;">GST: ${escapeHtml(bill.restaurant.gstNumber)}</div>` : ''}
                    </div>
                    <hr style="border-top:1px dashed #999;">
                    <div style="text-align:center;">Invoice: ${bill.invoiceNumber}<br>${bill.date}</div>
                    <hr style="border-top:1px dashed #999;">
                    ${bill.items.map(i => `<div style="display:flex;justify-content:space-between;"><span>${escapeHtml(i.name)} x${i.quantity}</span><span>₹${i.total.toFixed(2)}</span></div>`).join('')}
                    <hr style="border-top:1px dashed #999;">
                    <div style="display:flex;justify-content:space-between;"><span>Subtotal</span><span>₹${bill.subtotal.toFixed(2)}</span></div>
                    <div style="display:flex;justify-content:space-between;"><span>GST (${bill.gstRate}%)</span><span>₹${bill.gstAmount.toFixed(2)}</span></div>
                    <div style="font-weight:700; text-align:right;">GRAND: ₹${bill.grandTotal.toFixed(2)}</div>
                    <div style="text-align:center; margin-top:8px;">Thank you! 🙏</div>
                </div>
            `;
        }
        async function downloadPDF() {
            const el = document.getElementById('customerBillContent');
            const canvas = await html2canvas(el, { scale: 2, backgroundColor: '#ffffff' });
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const width = pdf.internal.pageSize.getWidth();
            const height = (canvas.height * width) / canvas.width;
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, width, height);
            pdf.save(`bill-${customerBillData.invoiceNumber}.pdf`);
            showToast('PDF downloaded');
        }
        function printBill() { window.print(); }
        function shareBill() {
            if (navigator.share) navigator.share({ title: 'Bill', url: window.location.href }).catch(()=>{});
            else { navigator.clipboard.writeText(window.location.href); showToast('Link copied!'); }
        }
        function copyBillDetails() {
            const bill = customerBillData;
            const text = `Invoice: ${bill.invoiceNumber}\nDate: ${bill.date}\n${bill.items.map(i => `${i.name} x${i.quantity} = ₹${i.total}`).join('\n')}\nTotal: ₹${bill.grandTotal}`;
            navigator.clipboard.writeText(text).then(() => showToast('Details copied!'));
        }

        // ========== OWNER SIDE ==========
        let items = [];
        let presets = [];
        let logoBase64 = null;
        let currentPreview = 'thermal';
        let qrUrl = '';

        function initOwner() {
            loadPresets();
            generateInvoiceNumber();
            updateDateTime();
            addSampleItems();
            updatePreviews();
            setInterval(updateDateTime, 30000);
        }

        function loadPresets() {
            const stored = localStorage.getItem('billgen-presets');
            presets = stored ? JSON.parse(stored) : [
                { name: 'Butter Chicken', price: 320 },
                { name: 'Garlic Naan', price: 45 },
                { name: 'Dal Makhani', price: 210 },
                { name: 'Jeera Rice', price: 130 },
            ];
            renderPresetList();
        }
        function savePresets() {
            localStorage.setItem('billgen-presets', JSON.stringify(presets));
            renderPresetList();
        }
        function addPreset() {
            const name = document.getElementById('presetName').value.trim();
            const price = parseFloat(document.getElementById('presetPrice').value);
            if (!name || isNaN(price) || price < 0) return showToast('Invalid preset', true);
            presets.push({ name, price });
            savePresets();
            document.getElementById('presetName').value = '';
            document.getElementById('presetPrice').value = '';
            showToast('Preset saved');
        }
        function clearPresets() { presets = []; savePresets(); }
        function renderPresetList() {
            const el = document.getElementById('presetList');
            el.innerHTML = presets.map((p, i) => `
                <div style="display:flex; justify-content:space-between; padding:4px; background:var(--bg-secondary); margin:4px 0; border-radius:6px;">
                    <span>🍽️ ${escapeHtml(p.name)} - ₹${p.price}</span>
                    <button class="btn btn-sm" onclick="addItemFromPreset(${i})">+</button>
                </div>`).join('') || '<p style="color:var(--text-muted);">No presets saved.</p>';
        }
        function addItemFromPreset(idx) {
            const p = presets[idx];
            addItem(p.name, 1, p.price);
        }
        function handleLogo(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    const max = 200;
                    if (w > max || h > max) { const r = Math.min(max/w, max/h); w *= r; h *= r; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    logoBase64 = canvas.toDataURL('image/png');
                    document.getElementById('logoPreview').src = logoBase64;
                    document.getElementById('logoPreview').classList.remove('hidden');
                    updatePreviews();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        function addItem(name='', qty=1, price=0) {
            items.push({ id: Date.now(), name, quantity: qty, price });
            renderItemsTable();
            updatePreviews();
        }
        function removeItem(id) {
            items = items.filter(i => i.id !== id);
            renderItemsTable();
            updatePreviews();
        }
        function updateItemField(id, field, value) {
            const item = items.find(i => i.id === id);
            if (item) { item[field] = field === 'quantity' ? Math.max(1, parseInt(value)||1) : value; updatePreviews(); }
        }
        function renderItemsTable() {
            const tbody = document.getElementById('itemsBody');
            tbody.innerHTML = items.map((item, idx) => `
                <tr>
                    <td>${idx+1}</td>
                    <td><input list="presetDataList" value="${escapeHtml(item.name)}" onchange="updateItemField(${item.id},'name',this.value)"></td>
                    <td><input type="number" value="${item.quantity}" min="1" style="width:60px;" onchange="updateItemField(${item.id},'quantity',this.value);renderItemsTable();"></td>
                    <td><input type="number" value="${item.price}" step="0.01" style="width:80px;" onchange="updateItemField(${item.id},'price',this.value);renderItemsTable();"></td>
                    <td>₹${(item.quantity*item.price).toFixed(2)}</td>
                    <td><button class="btn btn-sm btn-danger" onclick="removeItem(${item.id})">✕</button></td>
                </tr>`).join('');
            // datalist for presets
            let dl = document.getElementById('presetDataList');
            if (!dl) { dl = document.createElement('datalist'); dl.id = 'presetDataList'; document.body.appendChild(dl); }
            dl.innerHTML = presets.map(p => `<option value="${escapeHtml(p.name)}">`).join('');
            recalcTotals();
        }
        function addSampleItems() {
            if (items.length === 0 && presets.length > 0) presets.forEach(p => addItem(p.name, 1, p.price));
        }
        function clearItems() { items = []; renderItemsTable(); updatePreviews(); }
        function recalcTotals() {
            const subtotal = items.reduce((s,i) => s + i.quantity*i.price, 0);
            const gstRate = parseFloat(document.getElementById('gstRate').value)||0;
            const gst = subtotal * gstRate/100;
            document.getElementById('subtotalDisplay').textContent = '₹'+subtotal.toFixed(2);
            document.getElementById('gstAmountDisplay').textContent = '₹'+gst.toFixed(2);
            document.getElementById('grandTotalDisplay').textContent = '₹'+(subtotal+gst).toFixed(2);
        }

        function getBillData() {
            const subtotal = items.reduce((s,i) => s + i.quantity*i.price, 0);
            const gstRate = parseFloat(document.getElementById('gstRate').value)||0;
            const gst = subtotal * gstRate/100;
            return {
                version:'1.0',
                invoiceNumber: document.getElementById('invoiceNumber').value,
                date: document.getElementById('invoiceDate').value,
                restaurant: {
                    name: document.getElementById('restName').value,
                    address: document.getElementById('restAddress').value,
                    phone: document.getElementById('restPhone').value,
                    gstNumber: document.getElementById('restGST').value,
                    logo: logoBase64
                },
                items: items.map(i => ({ name:i.name, quantity:i.quantity, price:i.price, total:i.quantity*i.price })),
                subtotal, gstRate, gstAmount: gst, grandTotal: subtotal+gst
            };
        }

        function compressAndEncode(data) {
            const compressed = pako.deflate(JSON.stringify(data), { level:9 });
            let binary = '';
            for (let i=0; i<compressed.length; i+=8192) binary += String.fromCharCode.apply(null, compressed.subarray(i, i+8192));
            return btoa(binary).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
        }

        function generateQR() {
            if (items.length===0) return showToast('Add at least one item', true);
            const bill = getBillData();
            const encoded = compressAndEncode(bill);
            qrUrl = window.location.origin + window.location.pathname + '?data=' + encoded;
            document.getElementById('qrModal').classList.remove('hidden');
            document.getElementById('qrUrlDisplay').textContent = qrUrl;
            document.getElementById('qrCodeContainer').innerHTML = '';
            setTimeout(() => {
                new QRCode(document.getElementById('qrCodeContainer'), {
                    text: qrUrl, width: 200, height: 200,
                    colorDark: '#1a1a2e', colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.M
                });
            }, 100);
        }
        function closeQRModal() { document.getElementById('qrModal').classList.add('hidden'); }
        function copyQRUrl() { navigator.clipboard.writeText(qrUrl); showToast('URL copied!'); }

        function switchPreview(mode) {
            currentPreview = mode;
            document.getElementById('thermalTab').style.background = mode==='thermal' ? 'var(--accent)' : '';
            document.getElementById('a4Tab').style.background = mode==='a4' ? 'var(--accent)' : '';
            document.getElementById('thermalPreview').classList.toggle('hidden', mode!=='thermal');
            document.getElementById('a4Preview').classList.toggle('hidden', mode!=='a4');
            updatePreviews();
        }
        function updatePreviews() {
            const bill = getBillData();
            // Thermal
            document.getElementById('thermalPreview').innerHTML = bill.items.length ? `
                <div style="text-align:center;">${bill.restaurant.logo?`<img src="${bill.restaurant.logo}" style="max-width:50px;">`:''}
                <div style="font-weight:700;">${escapeHtml(bill.restaurant.name)}</div>
                <div style="font-size:0.65rem;">${escapeHtml(bill.restaurant.address)}</div>
                <div style="font-size:0.65rem;">📞 ${escapeHtml(bill.restaurant.phone)}</div>
                ${bill.restaurant.gstNumber?`<div style="font-size:0.6rem;">GST: ${escapeHtml(bill.restaurant.gstNumber)}</div>`:''}</div>
                <hr style="border-top:1px dashed #999;">
                <div style="text-align:center;">#${bill.invoiceNumber} ${bill.date}</div>
                <hr style="border-top:1px dashed #999;">
                ${bill.items.map(i => `<div style="display:flex;justify-content:space-between;"><span>${escapeHtml(i.name)} x${i.quantity}</span><span>₹${i.total.toFixed(2)}</span></div>`).join('')}
                <hr style="border-top:1px dashed #999;">
                <div style="display:flex;justify-content:space-between;"><span>Subtotal</span><span>₹${bill.subtotal.toFixed(2)}</span></div>
                <div style="display:flex;justify-content:space-between;"><span>GST (${bill.gstRate}%)</span><span>₹${bill.gstAmount.toFixed(2)}</span></div>
                <div style="font-weight:700;text-align:right;">GRAND: ₹${bill.grandTotal.toFixed(2)}</div>
                <div style="text-align:center;">Thank you! 🙏</div>
            ` : '<p style="text-align:center;">Add items to preview</p>';
            // A4 similarly... (abbreviated for space)
        }

        function generateInvoiceNumber() {
            const now = new Date();
            document.getElementById('invoiceNumber').value = `INV-${now.getFullYear().toString().slice(-2)}${String(now.getMonth()+1).padStart(2,'0')}-${Math.floor(Math.random()*9000)+1000}`;
        }
        function updateDateTime() {
            document.getElementById('invoiceDate').value = new Date().toLocaleString('en-IN');
        }
        function resetAll() {
            items = []; logoBase64 = null; document.getElementById('logoPreview').classList.add('hidden');
            document.getElementById('restName').value = 'Spice Garden Bistro';
            generateInvoiceNumber(); updateDateTime(); renderItemsTable(); updatePreviews();
        }
    </script>
</body>
</html>
